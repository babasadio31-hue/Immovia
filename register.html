<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Immovi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Unicons -->
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
    <style>
        :root {
            --color-primary: #59735d;
            --color-primary-hover: #455a48;
            --color-bg: #e6e9e6;
            --color-surface: #ffffff;
            --color-text: #1f2937;
            --color-text-muted: #6b7280;
            --color-border: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--color-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background-color: var(--color-surface);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        /* Background Graphics behind the card */
        .bg-graphics {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-circle {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .c1 { width: 800px; height: 800px; top: -400px; left: -200px; }
        .c2 { width: 600px; height: 600px; bottom: -200px; right: -100px; }

        /* Left Side (Image) */
        .login-left {
            flex: 1;
            position: relative;
            background: url('assets/login-bg.png') center/cover no-repeat;
            color: white;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1;
        }

        .login-left::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 100%);
            z-index: -1;
        }

        /* Abstract circles overlay on the image to match the user's screenshot */
        .overlay-graphics {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: -1;
        }
        .overlay-graphics .circle {
            position: absolute;
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        .oc1 { width: 500px; height: 500px; top: -150px; left: -150px; }
        .oc2 { width: 400px; height: 400px; bottom: 50px; left: -100px; }

        .login-left-content {
            max-width: 400px;
        }

        .badge {
            background-color: white;
            color: var(--color-primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-left h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .login-left p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        /* Right Side (Form) */
        .login-right {
            flex: 1;
            background-color: white;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-top-left-radius: 40px;
            border-bottom-left-radius: 40px;
            margin-left: -20px; /* Overlap effect */
            z-index: 2;
        }

        .login-right-inner {
            max-width: 360px;
            margin: 0 auto;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--color-text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1.25rem;
            border: 1px solid var(--color-primary);
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
            color: var(--color-text);
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(89, 115, 93, 0.2);
        }

        .form-control::placeholder {
            color: #9ca3af;
        }

        .forgot-password {
            display: block;
            text-align: right;
            color: var(--color-text-muted);
            font-size: 0.85rem;
            text-decoration: underline;
            margin-top: 0.5rem;
            margin-bottom: 2rem;
            cursor: pointer;
        }
        
        .forgot-password:hover {
            color: var(--color-primary);
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--color-primary-hover);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--color-text-muted);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--color-border);
        }

        .divider:not(:empty)::before {
            margin-right: 1rem;
        }

        .divider:not(:empty)::after {
            margin-left: 1rem;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: var(--color-primary);
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
        }

        .social-btn:hover {
            transform: scale(1.1);
            color: var(--color-primary-hover);
        }

        #login-error {
            color: #ef4444;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
            min-height: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }
            .login-left {
                display: none; /* Hide image on small screens */
            }
            .login-right {
                border-radius: 24px;
                margin-left: 0;
                padding: 2.5rem;
            }
        }
    </style>
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body>
    
    <div class="bg-graphics">
        <div class="bg-circle c1"></div>
        <div class="bg-circle c2"></div>
    </div>

    <!-- Bouton de retour -->
    <a href="landing.html" style="position: absolute; top: 2rem; left: 2rem; color: white; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: 500; font-family: 'Outfit', sans-serif; opacity: 0.8; transition: opacity 0.2s; z-index: 10;">
      <i class="fa-solid fa-arrow-left"></i> Retour à l'accueil
    </a>

    <div class="login-container">
        <div class="login-left">
            <div class="overlay-graphics">
                <div class="circle oc1"></div>
                <div class="circle oc2"></div>
            </div>
            <div class="login-left-content">
                <div class="badge">Bonjour !</div>
                <h1>Créez votre<br>espace personnel !</h1>
                <p>Rejoignez-nous pour gérer vos biens facilement.</p>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-right-inner">
                <div class="login-header">
                    <h2>Créer un compte</h2>
                    <p>Remplissez vos informations ci-dessous</p>
                </div>
                
                <div id="login-error"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" class="form-control" placeholder="Entrez votre nom" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Entrez votre email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <div style="position: relative;">
                            <input type="password" id="password" class="form-control" placeholder="Entrez un mot de passe" required style="padding-right: 2.5rem;">
                            <button type="button" id="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #6b7280; cursor: pointer; padding: 0;">
                                <i class="uil uil-eye" id="eye-icon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div style="margin-top: 1rem; margin-bottom: 2rem; text-align: center;">
                        <a href="login.html" style="color: var(--color-primary); font-size: 0.9rem; text-decoration: none; font-weight: 600;">Vous avez déjà un compte ? Se connecter</a>
                    </div>
                    
                    <button type="submit" class="btn-submit" id="btn-submit">Créer le compte</button>
                </form>
            </div>
        </div>
    </div>

    <script src="api.js?v=20260723"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const selectedPlan = urlParams.get('plan');

        if (selectedPlan === 'premium') {
            const headerDiv = document.querySelector('.login-header');
            if (headerDiv) {
                const badge = document.createElement('div');
                badge.style.cssText = 'background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); color: #8b5cf6; padding: 0.5rem 0.75rem; border-radius: 8px; font-size: 0.85rem; margin-top: 0.5rem; font-weight: 500;';
                badge.innerHTML = '✨ <strong>Plan Premium (1.000 FCFA/mois)</strong> — Paiement immédiat requis pour accéder à l\'application.';
                headerDiv.appendChild(badge);
            }
        }

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btnSubmit = document.getElementById('btn-submit');
            const errorDiv = document.getElementById('login-error');

            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Création du compte...';
            errorDiv.textContent = '';

            let createdUserId = null;

            try {
                // Call API register
                const registerRes = await API.register(name, email, password);
                if (registerRes && registerRes.id) {
                    createdUserId = registerRes.id;
                }
                
                // Login right after
                await API.login(email, password);

                if (selectedPlan === 'premium') {
                    btnSubmit.textContent = 'Initialisation du paiement sécurisé...';
                    try {
                        const sub = await API.createSubscriptionCheckout('premium');
                        if (sub && sub.checkout_url) {
                            window.location.href = sub.checkout_url;
                            return; // Stop here, browser redirects
                        } else {
                            throw new Error("L'URL de paiement n'a pas été retournée.");
                        }
                    } catch (subErr) {
                        console.error("Moneroo checkout init failed:", subErr);
                        // Rollback user creation
                        if (!createdUserId) {
                             const currentUser = await API.getCurrentUser();
                             if (currentUser && currentUser.id) createdUserId = currentUser.id;
                        }
                        if (createdUserId) {
                             await API.deleteUser(createdUserId).catch(e => console.error("Rollback failed", e));
                        }
                        localStorage.removeItem('immovi_jwt');
                        errorDiv.textContent = 'Erreur d\'initialisation du paiement sécurisé. Veuillez réessayer.';
                        return; // Stop here
                    }
                }
                
                // Redirect to main dashboard (for free plan or if no plan param)
                window.location.href = 'index.html';
            } catch (err) {
                errorDiv.textContent = err.message || 'Erreur lors de la création';
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Créer le compte';
            }
        });
        
        // Toggle password visibility
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        
        if (togglePassword && passwordInput && eyeIcon) {
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                if (type === 'text') {
                    eyeIcon.classList.remove('uil-eye');
                    eyeIcon.classList.add('uil-eye-slash');
                } else {
                    eyeIcon.classList.remove('uil-eye-slash');
                    eyeIcon.classList.add('uil-eye');
                }
            });
        }
        
        // If already logged in, redirect to index
        if(getAuthToken()) {
             window.location.href = 'index.html';
        }
    </script>
</body>
</html>
